# printer.cfg — Simulations-Modus (ohne Hardware)
#
# Funktioniert mit der Linux-Host-MCU (klipper_mcu + socat)
# die im supervisord.conf als /dev/klipper_mcu läuft.
#
# Wichtig:
#   - gpio-Pins statt PA/PB (Linux-MCU kennt nur gpio)
#   - sensor_type: EPCOS ... mit sensor_pin (Linux-MCU simuliert ADC)
#   - min_extrude_temp: 0  (kein echter Thermistor → Extrusion immer erlaubt)
#   - [move_export] für TCP-Streaming der Trapezsegmente

[mcu]
serial: /dev/klipper_mcu
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 50
max_z_accel: 500

# ─── Achsen ──────────────────────────────────────────────────

[stepper_x]
step_pin: gpio0
dir_pin: gpio1
enable_pin: !gpio2
microsteps: 16
rotation_distance: 40
endstop_pin: gpio3
position_endstop: 0
position_max: 500
homing_speed: 50

[stepper_y]
step_pin: gpio4
dir_pin: gpio5
enable_pin: !gpio6
microsteps: 16
rotation_distance: 40
endstop_pin: gpio7
position_endstop: 0
position_max: 500
homing_speed: 50

[stepper_z]
step_pin: gpio8
dir_pin: gpio9
enable_pin: !gpio10
microsteps: 16
rotation_distance: 8
endstop_pin: gpio11
position_endstop: 0
position_max: 300
homing_speed: 25

# ─── Extruder ────────────────────────────────────────────────

[extruder]
step_pin: gpio12
dir_pin: gpio13
enable_pin: !gpio14
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_velocity: 60
max_extrude_only_accel: 800
max_extrude_cross_section: 50
heater_pin: gpio15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio16
control: watermark
min_temp: 0
max_temp: 300
min_extrude_temp: 0
pressure_advance: 0.0
pressure_advance_smooth_time: 0.040

# ─── Virtuelle SD-Karte ─────────────────────────────────────

[virtual_sdcard]
path: /home/klippy/printer_data/gcodes

[display_status]
[pause_resume]

[force_move]
enable_force_move: True

# ─── Move Export (TCP-Streaming) ─────────────────────────────

[move_export]
output_path: /home/klippy/printer_data/logs/move_segments.csv
tcp_port: 7200
tcp_enabled: true
log_to_console: true
