<!doctype html>
<meta charset="utf-8" />
<title>EGM Status</title>
<pre id="out">loading...</pre>
<script>
async function tick(){
  const r = await fetch("/printer/objects/query?egm_commands");
  const j = await r.json();
  const s = j.result.status.egm_commands;
  document.getElementById("out").textContent =
    `ui_string: ${s.ui_string}\nui_int: ${s.ui_int}\nage_s: ${s.ui_age_s.toFixed(1)}\nbridge_running: ${s.bridge_running}`;
}
setInterval(tick, 1000); tick();
</script>
