[mcu]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 50
max_z_accel: 500

[stepper_x]
step_pin: gpio0
dir_pin: gpio1
enable_pin: !gpio2
microsteps: 16
rotation_distance: 40
endstop_pin: gpio3
position_endstop: 0
position_max: 500
homing_speed: 50

[stepper_y]
step_pin: gpio4
dir_pin: gpio5
enable_pin: !gpio6
microsteps: 16
rotation_distance: 40
endstop_pin: gpio7
position_endstop: 0
position_max: 500
homing_speed: 50

[stepper_z]
step_pin: gpio8
dir_pin: gpio9
enable_pin: !gpio10
microsteps: 16
rotation_distance: 8
endstop_pin: gpio11
position_endstop: 0
position_max: 300
homing_speed: 25

[extruder]
step_pin: gpio12
dir_pin: gpio13
enable_pin: !gpio14
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_velocity: 60
max_extrude_only_accel: 800
max_extrude_cross_section: 50
heater_pin: gpio15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio16
control: watermark
min_temp: 0
max_temp: 300
min_extrude_temp: 0
pressure_advance: 0.0
pressure_advance_smooth_time: 0.040

[virtual_sdcard]
path: /home/klippy/printer_data/gcodes

[display_status]
[pause_resume]

[force_move]
enable_force_move: True

[move_export]
output_path: /home/klippy/printer_data/logs/move_segments.csv
tcp_port: 7200
tcp_enabled: true
log_to_console: true

[egm_commands]
bridge_path: /home/klippy/bridge/run_bridge.py
bridge_config: /home/klippy/bridge/bridge_config.json
control_port: 7201
python_path: python3
auto_start_bridge: true
log_file: /home/klippy/printer_data/logs/egm_bridge.log
