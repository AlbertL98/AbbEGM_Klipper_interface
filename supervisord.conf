[supervisord]
nodaemon=true
user=root
logfile=/home/klippy/printer_data/logs/supervisord.log

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# SIMULATOR MCU - socat bridges stdio of klipper_mcu to a PTY
# Creates /tmp/klipper_host_mcu as a serial-like device
[program:klipper_mcu]
command=socat PTY,link=/dev/klipper_mcu,rawer,wait-slave EXEC:"/usr/local/bin/klipper_mcu",pty,rawer
user=klippy
directory=/home/klippy
autostart=true
autorestart=true
priority=100
startsecs=1
stdout_logfile=/home/klippy/printer_data/logs/klipper_mcu.log
stderr_logfile=/home/klippy/printer_data/logs/klipper_mcu_err.log

[program:klipper]
command=/home/klippy/klippy-env/bin/python /home/klippy/klipper/klippy/klippy.py /home/klippy/printer_data/config/printer.cfg -l /home/klippy/printer_data/logs/klippy.log -a /tmp/klippy_uds
user=klippy
directory=/home/klippy
autostart=true
autorestart=true
priority=200
startsecs=3
stdout_logfile=/home/klippy/printer_data/logs/klipper_stdout.log
stderr_logfile=/home/klippy/printer_data/logs/klipper_stderr.log

[program:moonraker]
command=/home/klippy/moonraker-env/bin/python /home/klippy/moonraker/moonraker/moonraker.py -d /home/klippy/printer_data
user=klippy
directory=/home/klippy
autostart=true
autorestart=true
priority=300
startsecs=5
stdout_logfile=/home/klippy/printer_data/logs/moonraker_stdout.log
stderr_logfile=/home/klippy/printer_data/logs/moonraker_stderr.log

[program:nginx]
command=/usr/sbin/nginx
user=root
autostart=true
autorestart=true
priority=400
startsecs=2
stdout_logfile=/home/klippy/printer_data/logs/nginx_stdout.log
stderr_logfile=/home/klippy/printer_data/logs/nginx_stderr.log
